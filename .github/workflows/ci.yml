name: CI

on:
  push:
    branches: [main, daedalus-v0.1-complete]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt
      - name: Backend import smoke test
        working-directory: backend
        run: python -c "from app.main import app; print(app.title)"

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install
      - name: Generate frontend entry files
        working-directory: frontend
        run: node scripts/setup-frontend.mjs
      - name: Frontend file smoke test
        working-directory: frontend
        run: test -f index.html && test -f vite.config.ts && test -f src/App.tsx
